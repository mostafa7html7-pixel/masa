<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألبوم عيد الفطر - أصدقائنا</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <!-- أيقونة الموقع (Favicon) -->
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3342/3342137.png" type="image/png">
    <!-- إعدادات PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
</head>
<body>
    <!-- شاشة البداية (Splash Screen) -->
    <div id="splash-screen">
        <div class="splash-content">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="splash-icon"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <h1>Galleria</h1>
            <div class="loading-bar"></div>
        </div>
    </div>

    <!-- هيدر احترافي جديد -->
    <header class="app-header">
        <div class="logo-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="site-icon"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
            <h1>Galleria</h1>
        </div>
        <!-- عداد الصور -->
        <div class="header-stats">
            <span id="total-photos-count">0</span> صورة
        </div>
        <!-- عداد المتصلين -->
        <div class="header-online">
            <span class="online-dot"></span> <span id="online-users-count">5</span>
        </div>
        
        <!-- قائمة الإعدادات (تجمع الإشعارات والتثبيت) -->
        <div class="header-menu-container">
            <button id="header-settings-btn" class="header-icon-btn" title="الإعدادات">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
            <div id="header-dropdown" class="header-dropdown">
                <button id="enable-notifications-btn" class="dropdown-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
                    <span>تفعيل الإشعارات</span>
                </button>
                <button id="install-pwa-btn" class="dropdown-item" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    <span>تثبيت التطبيق</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="gallery-section">
            <div id="gallery" class="gallery-grid">
                </div>
        </div>
    </main>

    <!-- The new "WhatsApp-like" upload UI -->
    <div class="upload-container">
        <!-- زر قائمة الفرز الجديد -->
        <button id="sort-menu-btn" class="sort-trigger-btn" title="ترتيب الصور">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" y1="10" x2="3" y2="10"></line><line x1="21" y1="6" x2="3" y2="6"></line><line x1="21" y1="14" x2="3" y2="14"></line><line x1="21" y1="18" x2="3" y2="18"></line></svg>
        </button>
        
        <input type="file" id="file-input" multiple accept="image/*">
        <label for="file-input" class="attach-btn" title="اختر صوراً">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </label>
        <div id="status" class="upload-status">اختر الصور من هنا لتشارك لحظاتك</div>
        <button id="upload-btn" class="mini-send-btn" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>

    <!-- قائمة الفرز المنبثقة -->
    <div id="sort-menu" class="sort-menu-popup">
        <button data-sort="newest" class="sort-option active">الأحدث 🕒</button>
        <button data-sort="popular" class="sort-option">الأكثر إعجاباً 🔥</button>
    </div>

    <!-- الشريط الجديد لمعاينة الصور فوق الرفع -->
    <div id="mini-preview" class="mini-preview-container">
        <button id="clear-preview" class="clear-preview-btn">&times;</button>
        <div id="mini-grid" class="mini-grid"></div>
    </div>

    <!-- Modal for viewing images -->
    <div id="image-modal" class="modal-overlay">
        <div class="modal-content">
            <!-- رأس النافذة: التاريخ وأزرار التحكم -->
            <div class="modal-header">
                <div id="modal-date" class="modal-date-container"></div>
                <div class="modal-actions">
                    <!-- حاوية التحكم في سرعة العرض -->
                    <div class="speed-control-container">
                        <button id="slideshow-speed-btn" class="action-btn" title="سرعة العرض">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                        </button>
                        <div id="slideshow-speed-menu" class="speed-menu-popup">
                            <button data-speed="5000" class="speed-option">بطيء</button>
                            <button data-speed="3000" class="speed-option active">عادي</button>
                            <button data-speed="1500" class="speed-option">سريع</button>
                        </div>
                    </div>
                    <button id="slideshow-btn" class="action-btn" title="تشغيل العرض التلقائي"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg></button>
                    <a id="download-btn" class="action-btn" href="#" download title="حفظ الصورة"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></a>
                    <button id="modal-close-btn" class="action-btn close-btn">&times;</button>
                </div>
            </div>
            
            <!-- جسم النافذة: الصورة -->
            <div class="modal-body">
                <!-- إرشادات التمرير -->
                <div id="swipe-instruction" class="swipe-instruction">
                    <span>👈 مرر لليسار لرؤية المزيد</span>
                </div>
                <img src="" alt="عرض مكبر للصورة" id="modal-image" class="modal-img">
            </div>
        </div>
        <!-- أزرار التنقل تم نقلها للخارج لتظهر بجانب النافذة -->
        <button id="next-btn" class="nav-btn next" title="الصورة التالية">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
    </div>

    <!-- حاوية الإشعارات -->
    <div id="notification-toast" class="notification-toast"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
